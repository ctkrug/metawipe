<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Metawipe — see what your photos leak, then wipe it</title>
    <meta
      name="description"
      content="Drop a photo in and see every EXIF, GPS and device field it's leaking. Strip it with one click — nothing ever leaves your browser."
    />

    <!-- Favicon: cyan crosshair reticle on ink-navy, generated in code. -->
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%230a0f1a'/%3E%3Cg fill='none' stroke='%2338e1d6' stroke-width='2'%3E%3Ccircle cx='16' cy='16' r='7'/%3E%3Cpath d='M16 3v5M16 24v5M3 16h5M24 16h5' stroke-linecap='round'/%3E%3C/g%3E%3Ccircle cx='16' cy='16' r='1.8' fill='%23ffb347'/%3E%3C/svg%3E"
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="./src/styles/main.css" />
  </head>
  <body>
    <div class="grid-bg" aria-hidden="true"></div>

    <header class="topbar">
      <a class="wordmark" href="./" aria-label="Metawipe home">
        <svg class="wordmark__glyph" viewBox="0 0 24 24" width="22" height="22" aria-hidden="true">
          <circle cx="12" cy="12" r="5" fill="none" stroke="currentColor" stroke-width="1.8" />
          <path d="M12 2v3M12 19v3M2 12h3M19 12h3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
          <circle cx="12" cy="12" r="1.4" fill="var(--warn)" />
        </svg>
        <span class="wordmark__text"><span>meta</span><em>wipe</em></span>
      </a>
      <p class="topbar__tag">100% in-browser · nothing uploads</p>
    </header>

    <main class="stage" id="app">
      <!-- The light-table (hero) + the leak panel are injected by main.js -->
    </main>

    <footer class="footer">
      <p>
        Metadata is parsed and stripped entirely on your device. Open the network
        tab — you'll see zero requests.
        <a href="https://github.com/ctkrug/metawipe" target="_blank" rel="noopener">Source</a>.
      </p>
    </footer>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
